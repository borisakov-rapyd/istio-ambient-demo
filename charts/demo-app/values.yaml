# ---- demo-app defaults --------------------------------------------------
name: demo-app

replicaCount: 1

image:
  # Echo server: answers any HTTP call with a JSON dump of the request.
  repository: mendhak/http-https-echo
  tag: "37"
  pullPolicy: IfNotPresent

service:
  port: 80          # the app "runs on port 80" from the caller's perspective
  targetPort: 8080  # container listens on 8080 (non-root friendly)

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    memory: 128Mi

# ---- Istio / ambient mesh ------------------------------------------------
istio:
  # THE demo switch.
  enabled: false

  # How the workload is enrolled into the ambient mesh:
  #   namespace — label istio.io/dataplane-mode: ambient on the NAMESPACE.
  #               All running pods join live: no restart, no injection. (demo default)
  #   pod       — same label on the Deployment pod template. Per-workload
  #               granularity (what our production helm chart does), but a
  #               pod-template change = new ReplicaSet = rolling restart;
  #               enrollment rides the next rollout.
  mode: namespace

  # ---------- L4 features (enforced by ztunnel) ----------

  # Namespace-wide STRICT mTLS (PeerAuthentication). Enable AFTER the service
  # is in the mesh to prove that plaintext callers get rejected.
  strictMtls: false

  # L4 authorization: only the listed service accounts may call this app.
  # (When a waypoint is attached, its identity is appended automatically.)
  authorizationPolicy:
    enabled: false
    allowedPrincipals: []
    # e.g. ["cluster.local/ns/checkout/sa/checkout"]

  # ---------- L7 features (require the waypoint) ----------

  # Waypoint = per-namespace L7 proxy. ztunnel alone gives L4 only (mTLS,
  # identity, TCP bytes). Enable this to get HTTP metrics in Kiali
  # (istio_requests_total), retries, canary weights, L7 authz.
  # Requires the Gateway API CRDs (installed by gateway-api-crds app).
  waypoint:
    enabled: false

  # L7 authorization, enforced by the waypoint (requires waypoint.enabled).
  # ALLOW semantics: only the listed methods/paths get through; everything
  # else is 403 — even with a valid mTLS identity. "ztunnel decides WHO may
  # connect; the waypoint decides WHAT they may do."
  l7Authz:
    enabled: false
    allowedMethods: ["GET"]
    allowedPaths: ["/api/*"]
    # optional: restrict to specific identities as well (empty = any meshed caller)
    allowedPrincipals: []

# ---- Traffic generator ----------------------------------------------------
# Optional in-cluster client that curls a target in a loop, so Kiali has a
# live graph to draw (and tcpdump has something to show).
trafficGenerator:
  enabled: false
  targetUrl: ""       # e.g. http://payment.payment.svc.cluster.local/api/charge
  intervalSeconds: 2
  # also send DELETEs: invisible while unrestricted, turns the Kiali edge
  # partly red (403) once the L7 authorization policy is enabled
  mixedMethods: false