{{- if .Values.trafficGenerator.enabled }}
# Loops requests at the target so Kiali has live traffic to draw.
# Inherits the same istio.enabled toggle as the main app.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "demo-app.name" . }}-traffic-gen
  labels:
    app: {{ include "demo-app.name" . }}-traffic-gen
    version: v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ include "demo-app.name" . }}-traffic-gen
  template:
    metadata:
      labels:
        app: {{ include "demo-app.name" . }}-traffic-gen
        version: v1
        {{- if and .Values.istio.enabled (eq .Values.istio.mode "pod") }}
        istio.io/dataplane-mode: ambient
        {{- end }}
    spec:
      serviceAccountName: {{ include "demo-app.name" . }}
      containers:
        - name: traffic-gen
          image: curlimages/curl:8.11.1
          command: ["/bin/sh", "-c"]
          args:
            - |
              while true; do
                curl -s -o /dev/null -w "GET %{http_code}\n" \
                  "{{ .Values.trafficGenerator.targetUrl }}" || true
                {{- if .Values.trafficGenerator.mixedMethods }}
                # also send a DELETE: 200 while unrestricted, turns 403 (red in Kiali)
                # the moment the L7 authorization policy lands on the waypoint
                curl -s -o /dev/null -w "DELETE %{http_code}\n" -X DELETE \
                  "{{ .Values.trafficGenerator.targetUrl }}" || true
                {{- end }}
                sleep {{ .Values.trafficGenerator.intervalSeconds }}
              done
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
{{- end }}
