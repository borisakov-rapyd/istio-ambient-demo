apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "demo-app.name" . }}
  labels:
    {{- include "demo-app.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "demo-app.name" . }}
  template:
    metadata:
      labels:
        {{- include "demo-app.labels" . | nindent 8 }}
        {{- if and .Values.istio.enabled (eq .Values.istio.mode "pod") }}
        # per-workload enrollment (production pattern) — note: changing the
        # pod template triggers a rolling restart; enrollment rides the rollout
        istio.io/dataplane-mode: ambient
        {{- end }}
    spec:
      serviceAccountName: {{ include "demo-app.name" . }}
      containers:
        - name: app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: HTTP_PORT
              value: {{ .Values.service.targetPort | quote }}
            - name: ECHO_INCLUDE_ENV_VARS
              value: "false"
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
