# Installs the demo applications (checkout, payment) from the local demo-app helm chart.
# Each app: apps/<name>/config.yaml (generator input) + apps/<name>/values.yaml (helm values).
# Auto-sync is OFF for these apps — the presenter syncs manually in the UI during the demo.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: demo-apps
  namespace: argocd
spec:
  syncPolicy:
    applicationsSync: create-update
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - git:
        repoURL: https://github.com/borisakov-rapyd/istio-ambient-demo.git
        revision: main
        files:
          - path: apps/*/config.yaml
  template:
    metadata:
      name: "{{ .appName }}"
      labels:
        type: demo-app
      annotations:
        argocd.argoproj.io/sync-wave: "10"
    spec:
      project: default
      revisionHistoryLimit: 2
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{ .namespace }}"
      sources:
        - repoURL: https://github.com/borisakov-rapyd/istio-ambient-demo.git
          targetRevision: main
          path: charts/demo-app
          helm:
            releaseName: "{{ .appName }}"
            ignoreMissingValueFiles: true
            valueFiles:
              - "$values/apps/{{ .appName }}/values.yaml"
        - repoURL: https://github.com/borisakov-rapyd/istio-ambient-demo.git
          targetRevision: main
          ref: values
      syncPolicy:
        # NO automated sync on purpose: during the live demo we click "Sync"
        # in the ArgoCD UI ourselves — better control and better theater.
        syncOptions:
          - CreateNamespace=true
