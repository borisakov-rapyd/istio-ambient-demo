# Gateway API CRDs (standard channel) — required for waypoint proxies
# (a waypoint IS a Gateway resource). Pulled directly from the upstream repo
# at a pinned tag, applied before everything else (wave -1).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gateway-api-crds
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: default
  source:
    repoURL: https://github.com/kubernetes-sigs/gateway-api.git
    targetRevision: v1.4.0        # pairs with Istio 1.29
    path: config/crd
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      selfHeal: true
    syncOptions:
      - ServerSideApply=true      # CRDs exceed client-side apply annotation limits
