# istiod with ambient enabled — mirrors devops-eks-addons-argocd global-values.
profile: ambient

meshConfig:
  enablePrometheusMerge: true
  outboundTrafficPolicy:
    mode: ALLOW_ANY
  defaultHttpRetryPolicy:
    attempts: 2
    retryOn: "connect-failure,refused-stream,unavailable,cancelled,reset"

pilot:
  # ---- TIP & TRICK: the node startup race ---------------------------------
  # On cluster scale-up, pods can be scheduled BEFORE istio-cni/ztunnel are
  # ready on the new node -> their traffic silently bypasses the mesh.
  # Fix: node pools add a cni.istio.io/not-ready taint at node creation
  # (e.g. via Karpenter/ASG startupTaints); the untaint controller below
  # removes it only once the CNI and ztunnel are Ready on that node.
  # Result: pods physically cannot land on a node where the mesh isn't ready.
  taint:
    enabled: true
    namespace: istio-system   # explicitly set namespace for CNI/ztunnel lookup
  env:
    PILOT_ENABLE_AMBIENT: "true"
    PILOT_AUTO_ALLOW_WAYPOINT_POLICY: "true"
    PILOT_ENABLE_NODE_UNTAINT_CONTROLLERS: "true"

global:
  logAsJson: false

