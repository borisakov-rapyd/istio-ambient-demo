name: checkout

istio:
  enabled: true   # <<< LIVE DEMO: flip to true, commit, push, watch ArgoCD
  mode: namespace  # namespace = live enrollment, no restart | pod = per-service, rides a rollout

  # L7 step: flip to true to attach a waypoint -> HTTP metrics appear in Kiali
  waypoint:
    enabled: true

# checkout continuously calls payment — this paints the Kiali graph
# and gives tcpdump something to capture.
trafficGenerator:
  enabled: true
  targetUrl: http://payment.payment.svc.cluster.local/api/charge
  intervalSeconds: 2
  mixedMethods: true   # GET + DELETE -> the DELETEs turn red in Kiali when L7 authz lands
