name: payment

istio:
  enabled: true   # <<< LIVE DEMO: flip to true, commit, push, watch ArgoCD
  mode: namespace  # namespace = live enrollment, no restart | pod = per-service, rides a rollout

  # ---------- L4 features (enforced by ztunnel) ----------

  strictMtls: false           # reject plaintext callers (PeerAuthentication STRICT)

  authorizationPolicy:
    enabled: true            # only checkout may call payment (waypoint identity auto-added)
    allowedPrincipals:
      - cluster.local/ns/checkout/sa/checkout

  # ---------- L7 features (require the waypoint) ----------

  # flip to true to attach a waypoint -> HTTP metrics appear in Kiali
  waypoint:
    enabled: true

  # L7 authz demo (needs waypoint). ALLOW semantics: what's listed passes,
  # everything else gets 403 — tune methods/paths freely for the demo.
  l7Authz:
    enabled: true
    allowedMethods: ["GET"]        # e.g. ["GET", "POST"]
    allowedPaths: ["/api/*"]       # e.g. ["/api/charge", "/health"]
    allowedPrincipals: []          # optional: also restrict WHO (SPIFFE identities)

# payment also calls checkout — bidirectional traffic for a livelier graph
trafficGenerator:
  enabled: true
  targetUrl: http://checkout.checkout.svc.cluster.local/api/refund
  intervalSeconds: 2
